# Tag a version (e.g. v0.1.0) and push to publish @nrql-js/nrql to npm.
# Requires repository secret: NPM_TOKEN (automation access token for the npm scope).

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-native:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec napi build --platform --release
      - uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.os }}
          path: nrql-js*.node
          if-no-files-found: error

  publish:
    name: Publish to npm
    needs: [build-native]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'
      - uses: dtolnay/rust-toolchain@stable
      - run: pnpm install --frozen-lockfile
      - name: Generate JS loader and Linux binary
        run: pnpm exec napi build --platform --release
      - uses: actions/download-artifact@v4
        with:
          path: downloaded
          merge-multiple: true
      - name: Merge prebuilt .node from all runners
        shell: bash
        run: |
          set -euo pipefail
          find downloaded -name 'nrql-js*.node' -print0 | while IFS= read -r -d '' f; do
            cp -f "$f" .
          done
          ls -la nrql-js*.node
      - name: Layout optional platform packages
        run: |
          pnpm exec napi create-npm-dirs
          pnpm exec napi artifacts --output-dir . --dist npm
          pnpm exec napi prepublish -t npm
      - name: Publish to npm
        run: npm publish --access public --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
