# Opens and updates Release PRs from conventional commits. When a release is
# created in this run, we also build/publish npm here (no PAT required).

name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-native:
    name: Build (${{ matrix.os }})
    needs: [release-please]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec napi build --platform --release
      - uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.os }}
          path: nrql-js*.node
          if-no-files-found: error

  publish:
    name: Publish to npm
    needs: [release-please, build-native]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'
      - uses: dtolnay/rust-toolchain@stable
      - run: pnpm install --frozen-lockfile
      - name: Generate JS loader and Linux binary
        run: pnpm exec napi build --platform --release
      - uses: actions/download-artifact@v4
        with:
          path: downloaded
          merge-multiple: true
      - name: Merge prebuilt .node from all runners
        shell: bash
        run: |
          set -euo pipefail
          find downloaded -name 'nrql-js*.node' -print0 | while IFS= read -r -d '' f; do
            cp -f "$f" .
          done
          ls -la nrql-js*.node
      - name: Layout optional platform packages
        run: |
          pnpm exec napi create-npm-dirs
          pnpm exec napi artifacts --output-dir . --npm-dir npm
          pnpm exec napi prepublish -t npm
      - name: Publish to npm
        run: npm publish --access public --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
